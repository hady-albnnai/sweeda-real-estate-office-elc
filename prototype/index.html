<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>عقارات السويداء — نموذج تفاعلي</title>
<style>
  :root{
    --green:#1f7a4d;        /* أخضر زيتوني/عقاري */
    --green-d:#155f3a;
    --green-l:#e7f4ec;
    --gold:#c9a227;
    --bg:#f4f6f8;
    --card:#ffffff;
    --ink:#1d2630;
    --muted:#7a8694;
    --line:#e7ebef;
    --danger:#d64545;
    --blue:#2563eb;
    --radius:16px;
    --shadow:0 6px 22px rgba(20,40,60,.10);
    --shadow-sm:0 2px 8px rgba(20,40,60,.07);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Cairo','Segoe UI',Tahoma,sans-serif;
    background:linear-gradient(135deg,#dfe7ee,#eef2f5);
    color:var(--ink);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:18px 0;
  }
  /* ===== Phone frame ===== */
  .phone{
    width:390px; max-width:100vw; height:844px; max-height:96vh;
    background:var(--bg);
    border-radius:42px;
    box-shadow:0 22px 60px rgba(10,30,50,.35), 0 0 0 11px #11161c, 0 0 0 13px #2a323c;
    overflow:hidden; position:relative; display:flex; flex-direction:column;
  }
  .notch{
    position:absolute; top:0; left:50%; transform:translateX(-50%);
    width:150px; height:26px; background:#11161c;
    border-radius:0 0 18px 18px; z-index:60;
  }
  .statusbar{
    height:42px; flex:0 0 42px; background:var(--green-d); color:#fff;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 22px; font-size:13px; font-weight:600; z-index:50;
  }
  .statusbar .right{display:flex; gap:6px; align-items:center;}

  /* ===== App body ===== */
  .screen{
    flex:1; overflow-y:auto; overflow-x:hidden; position:relative;
    -webkit-overflow-scrolling:touch;
  }
  .screen::-webkit-scrollbar{width:0;}
  .view{display:none; flex-direction:column; min-height:100%; animation:fade .25s ease;}
  .view.active{display:flex;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}

  /* ===== App bar ===== */
  .appbar{
    background:linear-gradient(135deg,var(--green),var(--green-d));
    color:#fff; padding:14px 16px 16px; position:relative;
    box-shadow:var(--shadow-sm);
  }
  .appbar .row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .appbar .brand{display:flex; align-items:center; gap:10px;}
  .appbar .brand .logo{
    width:38px; height:38px; border-radius:11px; background:rgba(255,255,255,.16);
    display:flex; align-items:center; justify-content:center; font-size:20px;
    border:1px solid rgba(255,255,255,.25);
  }
  .appbar .brand b{font-size:16px; display:block; line-height:1.2;}
  .appbar .brand span{font-size:11px; opacity:.85;}
  .iconbtn{
    width:38px; height:38px; border-radius:11px; border:none; cursor:pointer;
    background:rgba(255,255,255,.15); color:#fff; font-size:18px;
    display:flex; align-items:center; justify-content:center; position:relative;
  }
  .iconbtn .badge{
    position:absolute; top:-4px; left:-4px; background:var(--gold); color:#222;
    font-size:10px; min-width:17px; height:17px; border-radius:9px; font-weight:700;
    display:flex; align-items:center; justify-content:center; padding:0 3px;
  }
  .search{
    margin-top:12px; background:#fff; border-radius:12px; display:flex; align-items:center;
    padding:0 12px; height:42px; color:var(--muted); gap:8px;
  }
  .search input{border:none; outline:none; flex:1; font-family:inherit; font-size:14px; background:transparent; color:var(--ink);}

  /* ===== Tabs (segmented) ===== */
  .seg{
    display:flex; background:#fff; margin:12px; border-radius:13px; padding:5px;
    box-shadow:var(--shadow-sm); gap:4px;
  }
  .seg button{
    flex:1; border:none; background:transparent; padding:10px 6px; border-radius:9px;
    font-family:inherit; font-weight:700; font-size:13.5px; color:var(--muted); cursor:pointer;
    transition:.18s; display:flex; align-items:center; justify-content:center; gap:6px;
  }
  .seg button.active{background:var(--green); color:#fff; box-shadow:0 3px 8px rgba(31,122,77,.3);}

  .subseg{display:flex; gap:8px; padding:0 12px 4px; flex-wrap:wrap;}
  .chip{
    border:1px solid var(--line); background:#fff; color:var(--muted);
    padding:7px 14px; border-radius:20px; font-family:inherit; font-size:12.5px; font-weight:600;
    cursor:pointer; transition:.15s; display:flex; align-items:center; gap:5px;
  }
  .chip.active{background:var(--green-l); color:var(--green-d); border-color:var(--green);}

  /* ===== Cards / listing ===== */
  .list{padding:8px 12px 90px; display:flex; flex-direction:column; gap:12px;}
  .card{
    background:var(--card); border-radius:var(--radius); overflow:hidden;
    box-shadow:var(--shadow-sm); border:1px solid var(--line); cursor:pointer;
    transition:transform .12s;
  }
  .card:active{transform:scale(.985);}
  .card .photo{
    height:160px; position:relative; display:flex; align-items:flex-end;
    background-size:cover; background-position:center;
  }
  .card .photo .ov{
    position:absolute; inset:0; background:linear-gradient(to top,rgba(0,0,0,.55),rgba(0,0,0,0) 55%);
  }
  .tag{
    position:absolute; top:10px; font-size:11px; font-weight:700; padding:5px 10px;
    border-radius:8px; color:#fff; z-index:2;
  }
  .tag.r{right:10px;} .tag.l{left:10px;}
  .tag.sale{background:var(--green);}
  .tag.rent{background:var(--blue);}
  .tag.gold{background:var(--gold); color:#222;}
  .tag.broker{background:#6b21a8;}
  .card .photo .price{
    position:relative; z-index:2; color:#fff; padding:12px; font-weight:800; font-size:17px;
    text-shadow:0 1px 3px rgba(0,0,0,.5);
  }
  .card .body{padding:11px 13px 13px;}
  .card .body h3{margin:0 0 5px; font-size:15px;}
  .card .meta{color:var(--muted); font-size:12.5px; display:flex; align-items:center; gap:5px; margin-bottom:9px;}
  .specs{display:flex; gap:7px; flex-wrap:wrap;}
  .spec{
    background:var(--bg); border-radius:8px; padding:5px 9px; font-size:11.5px; color:var(--ink);
    display:flex; align-items:center; gap:4px; font-weight:600;
  }
  .card .foot{
    display:flex; justify-content:space-between; align-items:center; margin-top:11px;
    padding-top:10px; border-top:1px solid var(--line);
  }
  .src{font-size:11px; color:var(--muted); display:flex; align-items:center; gap:5px;}
  .btn{
    border:none; border-radius:10px; padding:9px 14px; font-family:inherit; font-weight:700;
    font-size:13px; cursor:pointer; display:flex; align-items:center; gap:6px; justify-content:center;
  }
  .btn.primary{background:var(--green); color:#fff;}
  .btn.ghost{background:var(--green-l); color:var(--green-d);}
  .btn.gold{background:var(--gold); color:#222;}
  .btn.block{width:100%;}
  .btn.lg{padding:13px;}
  .btn:disabled{opacity:.5;}

  /* ===== Bottom nav ===== */
  .bottomnav{
    position:absolute; bottom:0; left:0; right:0; height:64px; background:#fff;
    border-top:1px solid var(--line); display:flex; z-index:40;
    box-shadow:0 -4px 18px rgba(20,40,60,.06);
  }
  .bottomnav button{
    flex:1; border:none; background:transparent; cursor:pointer; font-family:inherit;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    color:var(--muted); font-size:11px; font-weight:600; position:relative;
  }
  .bottomnav button .ic{font-size:20px;}
  .bottomnav button.active{color:var(--green);}
  .bottomnav button.fab{position:relative;}
  .bottomnav button.fab .ic{
    width:48px; height:48px; border-radius:50%; background:var(--green); color:#fff;
    display:flex; align-items:center; justify-content:center; margin-top:-22px;
    box-shadow:0 6px 16px rgba(31,122,77,.4); font-size:26px;
  }

  /* ===== Section header ===== */
  .secthead{display:flex; justify-content:space-between; align-items:center; padding:4px 14px 0;}
  .secthead h2{font-size:15px; margin:0;}
  .secthead a{color:var(--green); font-size:12.5px; font-weight:700; text-decoration:none;}

  /* ===== Details ===== */
  .det-hero{height:280px; position:relative; background-size:cover; background-position:center;}
  .det-back{
    position:absolute; top:14px; right:14px; z-index:5; width:40px; height:40px; border-radius:12px;
    background:rgba(0,0,0,.4); color:#fff; border:none; font-size:20px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px);
  }
  .det-fav{
    position:absolute; top:14px; left:14px; z-index:5; width:40px; height:40px; border-radius:12px;
    background:rgba(0,0,0,.4); color:#fff; border:none; font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px);
  }
  .det-dots{position:absolute; bottom:12px; left:0; right:0; display:flex; gap:6px; justify-content:center; z-index:4;}
  .det-dots i{width:7px; height:7px; border-radius:50%; background:rgba(255,255,255,.5);}
  .det-dots i.on{background:#fff; width:18px; border-radius:4px;}
  .det-body{background:var(--bg); border-radius:22px 22px 0 0; margin-top:-22px; position:relative; z-index:3; padding:18px 16px 100px;}
  .det-price{font-size:24px; font-weight:800; color:var(--green-d);}
  .det-title{font-size:18px; margin:8px 0 4px;}
  .specgrid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:16px 0;}
  .specbox{background:#fff; border:1px solid var(--line); border-radius:13px; padding:12px; display:flex; gap:10px; align-items:center;}
  .specbox .si{font-size:22px;}
  .specbox b{display:block; font-size:14px;} .specbox span{font-size:11.5px; color:var(--muted);}
  .panel{background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:12px;}
  .panel h4{margin:0 0 8px; font-size:14px;}
  .panel p{margin:0; color:#444; font-size:13.5px; line-height:1.7;}
  .owner{display:flex; align-items:center; gap:11px;}
  .avatar{width:46px; height:46px; border-radius:50%; background:var(--green-l); color:var(--green-d); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:700;}

  /* sticky action bar in details */
  .actionbar{
    position:absolute; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--line);
    padding:12px 14px; display:flex; gap:10px; z-index:30; box-shadow:0 -4px 18px rgba(20,40,60,.07);
  }
  .actionbar .btn{flex:1;}

  /* ===== Modal / sheet ===== */
  .overlay{
    position:absolute; inset:0; background:rgba(10,20,30,.5); z-index:100; display:none;
    align-items:flex-end; justify-content:center; animation:fade .2s;
  }
  .overlay.active{display:flex;}
  .sheet{
    background:#fff; width:100%; border-radius:22px 22px 0 0; padding:18px 16px 22px;
    max-height:86%; overflow-y:auto; animation:slideup .28s ease;
  }
  @keyframes slideup{from{transform:translateY(100%);} to{transform:none;}}
  .sheet .grab{width:42px; height:4px; background:#d7dde3; border-radius:3px; margin:0 auto 14px;}
  .sheet h3{margin:0 0 4px; font-size:18px;}
  .sheet .sub{color:var(--muted); font-size:13px; margin-bottom:16px;}
  .field{margin-bottom:14px;}
  .field label{display:block; font-size:13px; font-weight:700; margin-bottom:6px;}
  .field input,.field select,.field textarea{
    width:100%; border:1.5px solid var(--line); border-radius:11px; padding:12px; font-family:inherit;
    font-size:14px; outline:none; background:var(--bg);
  }
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--green);}
  .row2{display:flex; gap:10px;} .row2>*{flex:1;}

  /* time slots */
  .slots{display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .slot{border:1.5px solid var(--line); border-radius:10px; padding:10px 4px; text-align:center; font-size:13px; font-weight:600; cursor:pointer; background:var(--bg);}
  .slot.active{background:var(--green); color:#fff; border-color:var(--green);}
  .days{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px;}
  .day{min-width:62px; border:1.5px solid var(--line); border-radius:12px; padding:9px 4px; text-align:center; cursor:pointer; background:var(--bg);}
  .day.active{background:var(--green); color:#fff; border-color:var(--green);}
  .day b{display:block; font-size:17px;} .day span{font-size:11px;}

  /* ===== Empty / banners ===== */
  .empty{text-align:center; padding:60px 30px; color:var(--muted);}
  .empty .ic{font-size:54px; margin-bottom:12px;}
  .empty h3{color:var(--ink); margin:0 0 6px;}
  .banner{
    margin:12px; background:linear-gradient(120deg,#fff7e0,#fdeecb); border:1px solid #f0dca0;
    border-radius:14px; padding:13px; display:flex; gap:11px; align-items:center; font-size:13px;
  }
  .banner .ic{font-size:24px;}
  .quota{margin:12px; background:#fff; border:1px solid var(--line); border-radius:14px; padding:13px;}
  .quota .bar{height:8px; background:var(--bg); border-radius:5px; overflow:hidden; margin-top:8px;}
  .quota .bar i{display:block; height:100%; background:var(--green); border-radius:5px;}

  /* request card */
  .rcard{background:#fff; border:1px solid var(--line); border-radius:14px; padding:13px; box-shadow:var(--shadow-sm);}
  .rcard .top{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
  .pill{font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px;}
  .pill.green{background:var(--green-l); color:var(--green-d);}
  .pill.blue{background:#e0ecff; color:#1d4ed8;}
  .pill.gold{background:#fbf0cf; color:#8a6d11;}
  .pill.gray{background:#eef1f4; color:var(--muted);}
  .pill.purple{background:#f3e8ff; color:#6b21a8;}

  /* appt item */
  .appt{display:flex; gap:12px; background:#fff; border:1px solid var(--line); border-radius:14px; padding:12px; box-shadow:var(--shadow-sm);}
  .appt .when{background:var(--green-l); color:var(--green-d); border-radius:11px; width:58px; flex:0 0 58px; display:flex; flex-direction:column; align-items:center; justify-content:center; font-weight:700;}
  .appt .when b{font-size:20px;} .appt .when span{font-size:11px;}
  .appt .info{flex:1;} .appt .info h4{margin:0 0 4px; font-size:14px;} .appt .info .m{font-size:12px; color:var(--muted);}

  /* login */
  .login-wrap{flex:1; background:linear-gradient(160deg,var(--green-d),var(--green)); display:flex; flex-direction:column; color:#fff; padding:30px 24px;}
  .login-wrap .logo-big{width:84px; height:84px; border-radius:24px; background:rgba(255,255,255,.16); border:1px solid rgba(255,255,255,.3); display:flex; align-items:center; justify-content:center; font-size:44px; margin:30px auto 18px;}
  .login-card{background:#fff; color:var(--ink); border-radius:20px; padding:22px; margin-top:24px; box-shadow:var(--shadow);}
  .otp-boxes{display:flex; gap:10px; justify-content:center; direction:ltr; margin:18px 0;}
  .otp-boxes input{width:46px; height:54px; text-align:center; font-size:22px; font-weight:700; border:1.5px solid var(--line); border-radius:12px; background:var(--bg);}

  .toast{
    position:absolute; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#11161c; color:#fff; padding:11px 18px; border-radius:12px; font-size:13px; font-weight:600;
    z-index:200; opacity:0; transition:.3s; pointer-events:none; max-width:80%; text-align:center;
    box-shadow:0 8px 24px rgba(0,0,0,.3);
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  .role-switch{
    position:fixed; bottom:14px; right:14px; z-index:999; background:#11161c; color:#fff;
    border-radius:14px; padding:8px; display:flex; gap:6px; box-shadow:0 8px 24px rgba(0,0,0,.3);
    font-size:11px; align-items:center;
  }
  .role-switch b{padding:0 6px; opacity:.7;}
  .role-switch button{border:none; background:#2a323c; color:#cbd3db; border-radius:9px; padding:7px 10px; font-family:inherit; font-weight:700; cursor:pointer; font-size:11px;}
  .role-switch button.on{background:var(--green); color:#fff;}

  .menu-item{display:flex; align-items:center; gap:13px; padding:14px; background:#fff; border:1px solid var(--line); border-radius:13px; margin-bottom:9px; cursor:pointer;}
  .menu-item .mi{width:38px; height:38px; border-radius:10px; background:var(--green-l); color:var(--green-d); display:flex; align-items:center; justify-content:center; font-size:18px;}
  .menu-item b{font-size:14px;} .menu-item small{color:var(--muted);}
  .menu-item .ar{margin-right:auto; color:var(--muted);}
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="statusbar">
    <span id="clock">9:41</span>
    <span class="right">📶 &nbsp; 🔋 88%</span>
  </div>
  <div class="screen" id="screen"><!-- views injected --></div>
  <div class="toast" id="toast"></div>
</div>

<div class="role-switch">
  <b>تجربة كـ:</b>
  <button data-role="visitor" class="on">زائر</button>
  <button data-role="user">مستخدم</button>
  <button data-role="broker">سمسار</button>
  <button data-role="admin">إدارة</button>
</div>

<script src="app.js"></script>
</body>
</html>
