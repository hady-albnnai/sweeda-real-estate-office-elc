name: sweeda_real_estate
description: تطبيق عقارات السويداء — مكتب عقاري إلكتروني
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.15
  cloud_functions: ^4.6.0

  # State Management
  provider: ^6.1.1

  # UI & Utilities
  cached_network_image: ^3.3.0
  image_picker: ^1.0.7
  flutter_image_compress: ^2.1.0
  intl: ^0.19.0
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  flutter_local_notifications: ^17.0.0

  # Navigation
  go_router: ^13.0.0

  # Storage & Cache
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Utils
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  carousel_slider: ^4.2.1
  dotted_border: ^2.1.0
  flutter_rating_bar: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300

  assets:
    - assets/images/
    - assets/icons/