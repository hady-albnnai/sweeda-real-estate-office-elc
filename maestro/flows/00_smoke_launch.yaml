# Smoke test: يفتح التطبيق من حالة نظيفة وينتظر الوصول لشاشة الزائر.
# نتحقق من وجود "حسابي" لأنها تظهر في شريط التنقل السفلي للزائر بعد انتهاء السبلاش.
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "حسابي"
    timeout: 35000
- takeScreenshot: smoke_launch
