appId: com.sweeda.realestate
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 10000
- extendedWaitUntil:
    visible: "e2e_nav_profile"
    timeout: 35000
- tapOn: "e2e_nav_profile"
- extendedWaitUntil:
    visible: "e2e_profile_login_section"
    timeout: 15000
- tapOn: "e2e_profile_login_section"
- extendedWaitUntil:
    visible: "e2e_login_username"
    timeout: 10000
- tapOn: "e2e_login_username"
- inputText: "${E2E_USERNAME}"
- tapOn: "e2e_login_password"
- inputText: "${E2E_PASSWORD}"
- tapOn: "e2e_login_button"
- extendedWaitUntil:
    visible: "${E2E_EXPECT_ID}"
    timeout: 30000
