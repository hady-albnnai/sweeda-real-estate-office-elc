appId: com.sweeda.realestate
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "حسابي"
    timeout: 25000
- tapOn: "حسابي"
- extendedWaitUntil:
    visible: "تسجيل الدخول"
    timeout: 12000
- tapOn: "تسجيل الدخول"
- tapOn: "اسم المستخدم أو رقم الهاتف"
- inputText: "${E2E_USERNAME}"
- tapOn: "كلمة المرور"
- inputText: "${E2E_PASSWORD}"
- tapOn: "دخول"
- extendedWaitUntil:
    visible: "${E2E_EXPECT}"
    timeout: 25000
