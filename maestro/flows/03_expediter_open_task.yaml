appId: com.sweeda.realestate
---
- runFlow:
    file: 01_login_password.yaml
    env:
      E2E_USERNAME: "${EXPEDITER_USERNAME}"
      E2E_PASSWORD: "${EXPEDITER_PASSWORD}"
      E2E_EXPECT_ID: "e2e_screen_expediter_tasks"
- extendedWaitUntil:
    visible: "${TASK_NUMBER}"
    timeout: 20000
- tapOn: "${TASK_NUMBER}"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: expediter_task_detail
